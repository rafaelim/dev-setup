name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build -ldflags="-s -w" -o rig ./cmd/rig

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: rig
